name: pages build and deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Validate site sources
        run: |
          set -euo pipefail

          for file in script.js product-detail.js admin.js chatbot.js other-products.js; do
            if [ -f "$file" ]; then
              node --check "$file"
            fi
          done

          node <<'NODE'
          const fs = require('fs');
          const css = fs.readFileSync('styles.css', 'utf8');
          let balance = 0;
          for (const char of css) {
            if (char === '{') balance += 1;
            if (char === '}') balance -= 1;
            if (balance < 0) {
              throw new Error('styles.css has more closing braces than opening braces.');
            }
          }
          if (balance !== 0) {
            throw new Error(`styles.css brace balance is ${balance}, expected 0.`);
          }
          NODE

          for file in index.html product-detail.html tra-cuu-bao-hanh.html; do
            if [ ! -f "$file" ]; then
              echo "Missing required page: $file" >&2
              exit 1
            fi
          done

          for file in styles.css chatbot.css script.js chatbot.js product-detail.js; do
            if [ -f "$file" ]; then
              :
            else
              echo "Missing referenced asset: $file" >&2
              exit 1
            fi
          done

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            ./ _site/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
